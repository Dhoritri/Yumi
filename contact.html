<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yumi</title>
  <link rel="icon" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="navbar-root"></div>
  <main class="site-main">
    <main class="page-white" id="contact-root">
      <div class="crumbbar">
        <div class="container crumb">
          <a href="index.html">Home</a>
          <span class="crumb__sep">—</span>
          <span class="crumb__current">Contact Us</span>
        </div>
      </div>

      <div data-reveal>
        <section class="contact container">
          <div class="contact__head">
            <h1 class="contact__title" data-text="header.title"></h1>
            <p class="contact__desc" data-text="header.description"></p>
          </div>

          <div class="contact__grid">
            <div class="contact__item">
              <div class="contact__icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              </div>
              <div>
                <h3 data-text="address.title"></h3>
                <div class="contact__lines">
                  <p><span data-text="address.lines[0]"></span><br /><span data-text="address.lines[1]"></span></p>
                  <p><span data-text="address.lines[2]"></span><br /><span data-text="address.lines[3]"></span></p>
                </div>
              </div>
            </div>

            <div class="contact__item">
              <div class="contact__icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </div>
              <div>
                <h3 data-text="contact.title"></h3>
                <div class="contact__lines">
                  <p>Mobile: <b data-text="contact.mobile"></b></p>
                  <p>Hotline: <b data-text="contact.hotline"></b></p>
                  <p>E-mail: <span class="email" data-text="contact.email"></span></p>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="contact-form-section">
          <div class="container contact-form-wrap">
            <h2 class="contact-form__title" data-text="form.title"></h2>
            <form class="contact-form" id="contact-form">
              <div class="contact-form__row">
                <input type="text" data-placeholder="form.placeholders.name" />
                <input type="email" data-placeholder="form.placeholders.email" />
                <input type="tel" data-placeholder="form.placeholders.phone" />
              </div>
              <textarea data-placeholder="form.placeholders.message" rows="8"></textarea>
              <div class="contact-form__submit-wrap">
                <button type="submit" class="contact-form__submit" data-text="form.buttonText"></button>
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>
  </main>
  <div id="footer-root"></div>
  <div id="scrolltop-root"></div>

  <script>window.PAGE_ROUTE = "/contact";</script>
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/contact.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
