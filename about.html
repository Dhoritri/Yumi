<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yumi</title>
  <link rel="icon" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="navbar-root"></div>
  <main class="site-main">
    <main class="page-white" id="about-root">
      <section data-reveal class="about-hero">
        <div class="container about-hero__content">
          <div class="about-hero__inner">
            <span class="about-hero__sub" data-text="hero.subtitle"></span>
            <h1 class="about-hero__title" data-text="hero.title"></h1>
          </div>
        </div>
        <div class="about-hero__bg">
          <img data-src="hero.backgroundImage" alt="About Hero" />
        </div>
      </section>

      <section data-reveal class="about-mission container">
        <div class="about-mission__inner">
          <div class="about-mission__icon">
            <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M30 10C30 10 24 20 24 28C24 34 28 38 30 38C32 38 36 34 36 28C36 20 30 10 30 10Z" fill="#A8BCA1"/>
              <path d="M18 25C18 25 12 33 12 40C12 45 15 48 18 48C21 48 24 45 24 40C24 33 18 25 18 25Z" fill="#A8BCA1" opacity="0.5"/>
              <path d="M42 25C42 25 48 33 48 40C48 45 45 48 42 48C39 48 36 45 36 40C36 33 42 25 42 25Z" fill="#A8BCA1" opacity="0.5"/>
            </svg>
          </div>
          <h2 class="about-mission__title" data-text="missionStatement.title"></h2>
          <div class="about-mission__desc-wrap">
            <p class="about-mission__desc" data-text="missionStatement.description"></p>
          </div>
        </div>
      </section>

      <section class="about-sections" id="about-sections"></section>
    </main>
  </main>
  <div id="footer-root"></div>
  <div id="scrolltop-root"></div>

  <!-- Repeated about-section row, cloned + filled by about.js -->
  <template id="tpl-about-section">
    <div data-reveal class="container">
      <div class="about-row">
        <div class="about-row__media">
          <img data-src="image" data-alt="title" />
        </div>
        <div class="about-row__text">
          <h2 class="about-row__title" data-text="title"></h2>
          <p class="about-row__desc" data-text="description"></p>
        </div>
      </div>
    </div>
  </template>

  <script>window.PAGE_ROUTE = "/about";</script>
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/about.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
