<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yumi</title>
  <link rel="icon" href="images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="navbar-root"></div>
  <main class="site-main">
    <main class="page-white" id="policy-root">
      <div class="crumbbar">
        <div class="container crumb">
          <a href="index.html">Home</a>
          <span class="crumb__sep">—</span>
          <span class="crumb__current" data-text="title"></span>
        </div>
      </div>

      <section data-reveal class="policy container">
        <div class="policy__head">
          <h1 class="policy__title" data-text="title"></h1>
          <p class="policy__updated">Last Updated: <span data-text="lastUpdated"></span></p>
        </div>
        <div class="policy__sections" id="policy-sections"></div>
        <div class="policy__note" id="policy-note" hidden>
          If you have any questions about our Privacy Policy, please contact us at hello@grace.com.
        </div>
      </section>
    </main>
  </main>
  <div id="footer-root"></div>
  <div id="scrolltop-root"></div>

  <!-- Repeated policy section markup, cloned + filled by policy.js -->
  <template id="tpl-policy-section">
    <div class="policy__section">
      <h2 data-text="title"></h2>
      <p data-text="content"></p>
    </div>
  </template>

  <script>window.PAGE_ROUTE = "/privacy-policy"; window.POLICY_TYPE = "privacy";</script>
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/policy.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
